<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1100" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#424242"/>
    </marker>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1000" height="1100" fill="#FAFAFA" rx="12"/>
  <text x="500" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#212121">Telemetry Capture Pipeline</text>

  <!-- Input -->
  <rect x="380" y="58" width="240" height="44" rx="8" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="1.5" filter="url(#sh)"/>
  <text x="500" y="85" text-anchor="middle" font-size="12" font-weight="600" fill="#424242">Candidate Kernel Code</text>
  <line x1="500" y1="102" x2="500" y2="132" stroke="#424242" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- GPU Block -->
  <rect x="60" y="140" width="880" height="300" rx="14" fill="#2D2D2D" filter="url(#sh)"/>
  <text x="500" y="170" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">NVIDIA H100 GPU</text>

  <!-- Kernel Execution -->
  <rect x="310" y="186" width="380" height="86" rx="8" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.2"/>
  <text x="500" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#E65100">Kernel Execution</text>
  <text x="500" y="232" text-anchor="middle" font-size="11" fill="#BF360C">Warmup (5) -- Correctness (3 trials) -- Performance (25 trials)</text>
  <text x="500" y="252" text-anchor="middle" font-size="10" fill="#BF360C" font-style="italic">torch.cuda.synchronize() between phases</text>

  <!-- Fork arrows -->
  <line x1="400" y1="272" x2="200" y2="310" stroke="#BDBDBD" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="500" y1="272" x2="500" y2="310" stroke="#BDBDBD" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="600" y1="272" x2="800" y2="310" stroke="#BDBDBD" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="290" y="292" font-size="8" fill="#9E9E9E" font-style="italic">concurrent</text>
  <text x="540" y="292" font-size="8" fill="#9E9E9E" font-style="italic">concurrent</text>
  <text x="710" y="292" font-size="8" fill="#9E9E9E" font-style="italic">concurrent</text>

  <!-- CUDA Events -->
  <rect x="90" y="316" width="220" height="108" rx="8" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1.2"/>
  <text x="200" y="340" text-anchor="middle" font-size="12" font-weight="600" fill="#1565C0">CUDA Events</text>
  <text x="200" y="360" text-anchor="middle" font-size="10" fill="#1976D2">cudaEventRecord(start)</text>
  <text x="200" y="376" text-anchor="middle" font-size="10" fill="#1976D2">kernel()</text>
  <text x="200" y="392" text-anchor="middle" font-size="10" fill="#1976D2">cudaEventRecord(stop)</text>
  <text x="200" y="412" text-anchor="middle" font-size="10" fill="#1565C0" font-weight="600">= runtime_ms, speedup</text>

  <!-- NVML Power Sampler -->
  <rect x="370" y="316" width="260" height="108" rx="8" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1.2"/>
  <text x="500" y="340" text-anchor="middle" font-size="12" font-weight="600" fill="#2E7D32">NVML Power Sampler</text>
  <text x="500" y="360" text-anchor="middle" font-size="10" fill="#388E3C">Python daemon thread</text>
  <text x="500" y="376" text-anchor="middle" font-size="10" fill="#388E3C">pynvml polling every 50ms</text>
  <text x="500" y="396" text-anchor="middle" font-size="10" fill="#388E3C">Records (timestamp_s, power_w)</text>
  <text x="500" y="412" text-anchor="middle" font-size="10" fill="#2E7D32" font-weight="600">= power time-series</text>

  <!-- Rust gRPC -->
  <rect x="690" y="316" width="230" height="108" rx="8" fill="#EDE7F6" stroke="#9575CD" stroke-width="1.2"/>
  <text x="805" y="336" text-anchor="middle" font-size="11" font-weight="600" fill="#4527A0">H100 Rust gRPC Sampler</text>
  <text x="805" y="354" text-anchor="middle" font-size="9" fill="#4527A0" font-style="italic">Tier 1: highest fidelity</text>
  <text x="805" y="372" text-anchor="middle" font-size="10" fill="#5E35B1">localhost:50052</text>
  <text x="805" y="389" text-anchor="middle" font-size="10" fill="#5E35B1">Power from energy delta</text>
  <text x="805" y="404" text-anchor="middle" font-size="10" fill="#5E35B1">+ util, temp, clocks,</text>
  <text x="805" y="418" text-anchor="middle" font-size="10" fill="#5E35B1">PCIe, memory, throttle</text>

  <!-- Outputs from GPU -->
  <line x1="200" y1="440" x2="200" y2="490" stroke="#424242" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="500" y1="440" x2="500" y2="490" stroke="#424242" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="805" y1="440" x2="805" y2="490" stroke="#424242" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Kernel Timing -->
  <rect x="110" y="498" width="180" height="80" rx="8" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1.2" filter="url(#sh)"/>
  <text x="200" y="522" text-anchor="middle" font-size="12" font-weight="600" fill="#1565C0">Kernel Timing</text>
  <text x="200" y="544" text-anchor="middle" font-size="11" fill="#1976D2">runtime_ms</text>
  <text x="200" y="562" text-anchor="middle" font-size="11" fill="#1976D2">speedup</text>

  <!-- Trapezoidal Integration -->
  <rect x="370" y="498" width="260" height="80" rx="8" fill="#C8E6C9" stroke="#66BB6A" stroke-width="1.2" filter="url(#sh)"/>
  <text x="500" y="520" text-anchor="middle" font-size="12" font-weight="600" fill="#2E7D32">Trapezoidal Integration</text>
  <text x="500" y="542" text-anchor="middle" font-size="11" fill="#388E3C" font-family="Courier New, monospace">E = sum 0.5*(Pi+Pi+1)*dt</text>
  <text x="500" y="564" text-anchor="middle" font-size="11" fill="#388E3C" font-weight="600">= avg_power_w, total joules</text>

  <!-- EnergyTrace -->
  <rect x="690" y="498" width="230" height="80" rx="8" fill="#D1C4E9" stroke="#9575CD" stroke-width="1.2" filter="url(#sh)"/>
  <text x="805" y="520" text-anchor="middle" font-size="12" font-weight="600" fill="#4527A0">EnergyTrace</text>
  <text x="805" y="540" text-anchor="middle" font-size="10" fill="#5E35B1">timestamps[], power_w[]</text>
  <text x="805" y="556" text-anchor="middle" font-size="10" fill="#5E35B1">energy_j[], gpu_util[]</text>
  <text x="805" y="572" text-anchor="middle" font-size="10" fill="#5E35B1">temp_c[], phase_segments[]</text>

  <line x1="805" y1="578" x2="805" y2="630" stroke="#424242" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="825" y="610" font-size="9" fill="#757575" font-style="italic">full trace</text>

  <!-- Phase Attribution -->
  <rect x="630" y="636" width="350" height="110" rx="10" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.5" filter="url(#sh)"/>
  <text x="805" y="662" text-anchor="middle" font-size="13" font-weight="600" fill="#E65100">Phase Attribution</text>
  <text x="805" y="684" text-anchor="middle" font-size="11" fill="#BF360C">Split trace at TTFT boundary</text>

  <rect x="655" y="698" width="140" height="36" rx="6" fill="#FFE0B2"/>
  <text x="725" y="720" text-anchor="middle" font-size="11" font-weight="600" fill="#E65100">Prefill</text>
  <text x="725" y="730" text-anchor="middle" font-size="9" fill="#BF360C">energy_j</text>

  <rect x="815" y="698" width="140" height="36" rx="6" fill="#FFE0B2"/>
  <text x="885" y="720" text-anchor="middle" font-size="11" font-weight="600" fill="#E65100">Decode</text>
  <text x="885" y="730" text-anchor="middle" font-size="9" fill="#BF360C">energy_j</text>

  <line x1="805" y1="746" x2="805" y2="790" stroke="#424242" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- IPW Adapter -->
  <rect x="630" y="798" width="350" height="100" rx="10" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1.5" filter="url(#sh)"/>
  <text x="805" y="824" text-anchor="middle" font-size="13" font-weight="600" fill="#1565C0">IPW Adapter</text>
  <text x="805" y="848" text-anchor="middle" font-size="11" fill="#1976D2">energy_per_output_token_j</text>
  <text x="805" y="866" text-anchor="middle" font-size="11" fill="#1976D2">throughput_tps, IPW, IPJ</text>
  <text x="805" y="884" text-anchor="middle" font-size="11" fill="#1976D2">prefill_energy/token, decode_energy/token</text>

  <!-- Converge to Reward -->
  <line x1="200" y1="578" x2="200" y2="978" stroke="#424242" stroke-width="1.2" stroke-dasharray="6,3"/>
  <line x1="200" y1="978" x2="310" y2="978" stroke="#424242" stroke-width="1.5" marker-end="url(#arr)"/>

  <line x1="500" y1="578" x2="500" y2="940" stroke="#424242" stroke-width="1.2" stroke-dasharray="6,3"/>
  <line x1="500" y1="940" x2="500" y2="958" stroke="#424242" stroke-width="1.5" marker-end="url(#arr)"/>

  <line x1="805" y1="898" x2="805" y2="940" stroke="#424242" stroke-width="1.2"/>
  <line x1="805" y1="940" x2="700" y2="958" stroke="#424242" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Reward Function -->
  <rect x="180" y="960" width="640" height="110" rx="12" fill="#FFCDD2" stroke="#EF5350" stroke-width="2" filter="url(#sh)"/>
  <text x="500" y="988" text-anchor="middle" font-size="14" font-weight="700" fill="#B71C1C">Reward Function</text>
  <text x="500" y="1016" text-anchor="middle" font-size="11" fill="#424242">runtime_ms, speedup (from CUDA events)</text>
  <text x="500" y="1036" text-anchor="middle" font-size="11" fill="#424242">joules, avg_power_w (from NVML integration)</text>
  <text x="500" y="1056" text-anchor="middle" font-size="11" fill="#424242">energy/token, IPW (from IPW adapter)</text>

  <text x="500" y="1088" text-anchor="middle" font-size="12" font-weight="700" fill="#B71C1C">= scalar reward for GRPO policy update</text>

</svg>
