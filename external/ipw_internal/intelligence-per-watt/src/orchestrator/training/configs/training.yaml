# Training configuration for orchestrator (IPJ-Optimized)
# Configured for Qwen 8B with online data collection

# Model configuration
model:
  name: "Qwen/Qwen3-8B"
  # Alternative models:
  # - "Qwen/Qwen3-1.7B"      # Smaller, faster training
  # - "Qwen/Qwen2.5-7B-Instruct"  # Instruction-tuned
  # - "meta-llama/Llama-3.2-8B"   # Alternative architecture

  max_tokens: 256          # Max tokens to generate per action
  temperature: 0.7         # Sampling temperature

# Dataset configuration
dataset:
  name: "nvidia/ToolScale"
  split: "train"
  limit: null              # null = use all data, or set to number for subset
  category: null           # Filter by category (math, code, search, etc.)
  difficulty: null         # Filter by difficulty (easy, medium, hard)

  # Multi-dataset mode (ToolScale + GeneralThought)
  use_mixed: true
  toolscale_weight: 0.5
  generalthought_weight: 0.5
  min_verifier_score: 0.5  # Quality filter for GeneralThought

# Training hyperparameters
training:
  num_epochs: 10           # More epochs for 8B model
  batch_size: 2            # Reduced for 8B model memory
  learning_rate: 1.0e-6    # Lower LR for 8B
  warmup_steps: 100

  # GRPO-specific
  group_size: 8            # Number of samples per prompt (rollout_agents)
  kl_coef: 0.0001         # KL divergence penalty
  clip_range: 0.2          # PPO clip range

  # Gradient
  max_grad_norm: 1.0       # Gradient clipping
  gradient_accumulation_steps: 8  # Effective batch = 16

  # Online data collection (for IPJ optimization)
  use_online_collection: true  # Real execution for accurate energy measurement

  # Multi-GPU
  num_gpus: 4              # Number of GPUs to use (1, 2, 4, 8)
  distributed_backend: "ddp"  # "ddp" or "deepspeed"

# Environment configuration
environment:
  max_turns: 10            # Maximum turns per episode
  enable_sampling: true    # Sample from telemetry profiles with noise

  # Available tools (automatically detected from cache)
  tools:
    # Free tools (no cost)
    - "calculator"
    - "think"
    - "code_interpreter"

    # Web search (requires TAVILY_API_KEY)
    - "web_search"

    # Local models via Ollama (no cost, fast)
    - "ollama:llama3.2:1b"
    - "ollama:llama3.2:3b"
    - "ollama:qwen2.5:0.5b"
    - "ollama:qwen2.5:1.5b"

    # Large models via vLLM (requires vLLM server)
    - "vllm:qwen3-8b"
    - "vllm:qwen3-32b"
    - "vllm:llama-8b"
    - "vllm:llama-70b"

    # Specialist models via vLLM
    - "vllm:qwen-math-7b"
    - "vllm:glm-4.7"
    - "vllm:qwen-coder-7b"
    - "vllm:qwen3-coder-plus"

    # Cloud APIs (requires API keys)
    - "openai:gpt-5-mini-2025-08-07"
    - "openai:gpt-4o"
    - "anthropic:claude-3-5-haiku-20241022"
    - "anthropic:claude-sonnet-4-5-20241022"

# Reward configuration (references reward_weights.yaml)
reward:
  config: "default"        # default, accuracy_focused, efficiency_focused, etc.
  use_adaptive: true       # Use adaptive weights during training

# Checkpointing
checkpointing:
  save_dir: "checkpoints"
  save_every_n_epochs: 1
  keep_last_n: 3           # Keep only last N checkpoints

# Logging
logging:
  log_dir: "logs"
  log_every_n_steps: 10
  use_wandb: false         # Enable Weights & Biases logging
  wandb_project: "orchestrator"
  wandb_entity: null       # Your W&B username/team

# Evaluation
evaluation:
  eval_every_n_epochs: 1
  eval_episodes: 100       # Number of episodes for evaluation
  use_real_env: false      # Use real MCP servers for eval (slower but accurate)

# Data caching
cache:
  telemetry_cache_path: "data/telemetry_cache.db"
  require_cache: true      # Fail if cache is empty
  min_coverage: 100        # Minimum profiles per tool

# Advanced memory optimizations (important for 8B model)
advanced:
  mixed_precision: true    # Use mixed precision training (faster, less memory)
  compile_model: false     # Use torch.compile (PyTorch 2.0+)
  gradient_checkpointing: true  # Save memory at cost of speed (~30% slower)
  use_8bit_ref: true       # Load reference model in 8-bit (~50% memory savings)
  use_8bit_optimizer: false  # Use bitsandbytes 8-bit AdamW (optional)
  use_flash_attention: true  # Enable Flash Attention 2 (faster, less memory)
