train:
  mode: energy_aware
  epochs: 1
  energy_aware: true
  group_size: 4
  batch_size: 4
  max_completion_length: 256
  max_tasks: 270
  eval_num_correct_trials: 1
  eval_num_perf_trials: 5
  failure_log_every_steps: 5
  reward:
    alpha: 1.0
    beta: 0.5
    gamma_latency: 0.25
    delta_power: 0.01
    eta_runtime: 0.1
    correctness_bonus: 0.0
    compile_fail: -1.0
    incorrect: -0.5
    oom_penalty: 0.5
    sla_latency_s: 1.0
    ipw_blend_weight: 0.25
  telemetry:
    trace_dir: ./data/telemetry/runs
    ipw_profile_dir: null
    allow_synthetic_fallback: true
