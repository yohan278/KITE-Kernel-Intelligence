# 12-hour throughput GRPO run on 4x L40S (one node).
# Scale: ~24 epochs × many tasks to fill 12h (L40 ~2–4× slower than H100).
train:
  mode: throughput
  epochs: 24
  energy_aware: false
  group_size: 8
  batch_size: 8
  max_completion_length: 512
  max_tasks: 128
  eval_num_correct_trials: 1
  eval_num_perf_trials: 5
  failure_log_every_steps: 5
  reward:
    alpha: 1.0
    beta: 0.0
  telemetry:
    trace_dir: ./data/telemetry/runs
    ipw_profile_dir: null
